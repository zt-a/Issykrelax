x-app-env: &app-env
  env_file: .env

x-app-restart: &restart
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    <<: *restart
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-relax}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?err}
      POSTGRES_DB: ${POSTGRES_DB:-relax}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-relax}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    <<: *restart
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    <<: [*restart, *app-env]
    environment:
      POSTGRES_HOST: postgres
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && python scripts/seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    <<: [*restart, *app-env]
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.infrastructure.tasks.worker worker -l info --without-mingle --without-gossip

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    <<: [*restart, *app-env]
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.infrastructure.tasks.worker beat -l info

  frontend-builder:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend-dist:/app/dist
    command: sh -c "npm ci && npm run build"
    profiles:
      - build

  nginx:
    image: nginx:alpine
    <<: *restart
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/issykrelax.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-dist:/usr/share/nginx/html:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    depends_on:
      - backend

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    profiles:
      - certbot
    command: certonly --webroot -w /var/www/certbot --email admin@issykrelax.kg -d issykrelax.kg -d www.issykrelax.kg --agree-tos --non-interactive

volumes:
  pgdata:
  frontend-dist:
  certbot-www:
  certbot-conf:
