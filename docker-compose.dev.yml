x-app-env: &app-env
  env_file: .env

x-app-restart: &restart
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    <<: *restart
    networks:
      - relax-net
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-relax}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?err}
      POSTGRES_DB: ${POSTGRES_DB:-relax}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-relax}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    <<: *restart
    networks:
      - relax-net
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    <<: [*restart, *app-env]
    networks:
      - relax-net
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head && python scripts/seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    <<: [*restart, *app-env]
    networks:
      - relax-net
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.infrastructure.tasks.worker worker -l info --without-mingle --without-gossip

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    <<: [*restart, *app-env]
    networks:
      - relax-net
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.infrastructure.tasks.worker beat -l info

  frontend:
    image: node:22-alpine
    <<: *app-env
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npx vite --host 0.0.0.0"

networks:
  relax-net:
    driver: bridge

volumes:
  pgdata:
